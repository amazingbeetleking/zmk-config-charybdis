# Dongle configuration for nice!nano with 128x32 OLED

# Split central (dongle acts as central/receiver)
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# Display dedicated thread stack size - increased for stability
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=8192

# Increase BLE transmit power for better range/stability
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Display
CONFIG_ZMK_DISPLAY=y

# Battery level fetching from peripherals over BLE
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# USB HID Battery reporting for both halves
CONFIG_USB_HID_DEVICE_COUNT=2
CONFIG_ZMK_USB_HID_BATTERY_REPORTING=y
CONFIG_ZMK_USB_HID_BATTERY_REPORTING_SPLIT=y

# Mouse/Trackball support - receive input from peripheral
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_MOUSE=y

# 128x32 OLED specific settings
CONFIG_ZMK_DONGLE_DISPLAY_BONGO_CAT=n
CONFIG_ZMK_DONGLE_DISPLAY_MODIFIERS=y

# Reduce buffer size for 128x32 OLED stability
CONFIG_LV_Z_VDB_SIZE=32

# Optional: Show dongle battery level (disabled - USB powered)
CONFIG_ZMK_DONGLE_DISPLAY_DONGLE_BATTERY=n

# Optional: Layer name alignment (good for 32px height)
CONFIG_ZMK_DONGLE_DISPLAY_LAYER_TEXT_ALIGN="center"

# Display timeout - 5 minutes (300000 milliseconds)
CONFIG_ZMK_IDLE_TIMEOUT=300000

# Disable deep sleep (USB powered, always on)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=2147483647
